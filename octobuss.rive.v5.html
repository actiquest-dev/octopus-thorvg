<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Octobuss v5 Rive-style</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body { display: grid; place-items: center; background: #d8dade; }
    .stage { width: min(88vmin, 860px); aspect-ratio: 1; }
    svg { width: 100%; height: 100%; display: block; }
    .limb-fill { fill: #aa74db; stroke: #7345a8; stroke-width: 4; stroke-linejoin: round; }
    .limb-shade { fill: rgba(110, 69, 165, 0.24); }
    .sucker { fill: #f4adc9; stroke: #ca789a; stroke-width: 1.2; }
  </style>
</head>
<body>
  <div class="stage">
    <svg id="scene" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="800" height="800" fill="#d8dade"/>
      <g id="character_octopus" data-rig="character">
        <g id="tentacles_back" data-rig="layer"></g>

        <g id="body" data-rig="object">
          <circle id="head_fill" cx="400" cy="270" r="150" fill="#a67ad7" stroke="#7345a8" stroke-width="4"/>
          <ellipse cx="448" cy="220" rx="24" ry="14" fill="rgba(214,184,243,.58)" transform="rotate(30 448 220)"/>
          <ellipse cx="306" cy="206" rx="30" ry="14" fill="rgba(214,184,243,.55)" transform="rotate(-30 306 206)"/>
          <ellipse id="cheek_l" cx="330" cy="326" rx="26" ry="25" fill="#eb8bb2"/>
          <ellipse id="cheek_r" cx="470" cy="326" rx="26" ry="25" fill="#eb8bb2"/>
        </g>

        <g id="tentacles_front" data-rig="layer"></g>

        <g id="collar" data-rig="object">
          <ellipse cx="400" cy="396" rx="176" ry="42" fill="#504a57"/>
          <ellipse cx="400" cy="386" rx="162" ry="32" fill="#6d6677"/>
          <ellipse cx="400" cy="398" rx="178" ry="38" fill="none" stroke="#3c3742" stroke-width="4"/>
        </g>

        <g id="face" data-rig="object">
          <g id="eye_left" data-rig="eye" data-pivot-x="338" data-pivot-y="274">
            <circle cx="338" cy="274" r="42" fill="#f4fbff"/>
            <circle id="eye_left_pupil" cx="342" cy="281" r="27" fill="#34303c"/>
            <circle cx="355" cy="263" r="7" fill="#fff"/>
          </g>
          <g id="eye_right" data-rig="eye" data-pivot-x="462" data-pivot-y="274">
            <circle cx="462" cy="274" r="42" fill="#f4fbff"/>
            <circle id="eye_right_pupil" cx="466" cy="281" r="27" fill="#34303c"/>
            <circle cx="479" cy="263" r="7" fill="#fff"/>
          </g>
          <g id="mouth" data-rig="mouth" data-pivot-x="400" data-pivot-y="344">
            <path id="mouth_open" d="M348 338 C360 362 440 362 452 338 C444 374 356 374 348 338 Z" fill="#5a2f3c"/>
            <path id="tongue" d="M371 358 C383 374 417 374 429 358" fill="none" stroke="#ec7f9f" stroke-width="11" stroke-linecap="round"/>
          </g>
        </g>

        <g id="helmet" data-rig="object">
          <circle cx="400" cy="270" r="188" fill="rgba(186,230,244,.24)" stroke="#81adc4" stroke-width="4"/>
          <ellipse cx="286" cy="176" rx="24" ry="12" fill="rgba(255,255,255,.62)" transform="rotate(-35 286 176)"/>
          <ellipse cx="514" cy="176" rx="24" ry="12" fill="rgba(255,255,255,.62)" transform="rotate(35 514 176)"/>
        </g>
      </g>
    </svg>
  </div>

  <script>
    const NS = 'http://www.w3.org/2000/svg';
    const rigs = [];

    const RIVE_LIKE_RIG = {
      nodes: ['body','helmet','collar','face','eye_left','eye_right','mouth','tentacle_01','tentacle_02','tentacle_03','tentacle_04','tentacle_05','tentacle_06','tentacle_07','tentacle_08'],
      states: ['idle','blink','talk','tentacle_wave'],
      transitions: [['idle','blink'],['idle','talk'],['idle','tentacle_wave'],['talk','idle'],['blink','idle'],['tentacle_wave','idle']]
    };
    window.OCTOBUSS_V5_RIG = RIVE_LIKE_RIG;

    function el(name, attrs={}) {
      const n = document.createElementNS(NS, name);
      Object.entries(attrs).forEach(([k,v]) => n.setAttribute(k, v));
      return n;
    }

    function makeSegment(len, w, idPrefix, idx) {
      const g = el('g', { id: `${idPrefix}_bone_${idx}`, 'data-rig':'bone' });
      const main = el('path', {
        class: 'limb-fill',
        d: `M0 ${-w} C${len*0.32} ${-w*1.12} ${len*0.72} ${-w*0.86} ${len} ${-w*0.24} C${len*1.08} ${w*0.05} ${len*1.08} ${w*0.44} ${len*0.97} ${w*0.7} C${len*0.70} ${w*1.03} ${len*0.35} ${w*1.06} 0 ${w} Z`
      });
      const shade = el('path', {
        class: 'limb-shade',
        d: `M2 ${w*0.12} C${len*0.35} ${w*0.36} ${len*0.72} ${w*0.33} ${len*0.96} ${w*0.12} C${len*0.86} ${w*0.6} ${len*0.58} ${w*0.8} ${len*0.05} ${w*0.74} Z`
      });
      const hi = el('path', {
        d: `M${len*0.1} ${-w*0.42} C${len*0.33} ${-w*0.52} ${len*0.58} ${-w*0.43} ${len*0.8} ${-w*0.22}`,
        fill: 'none', stroke: 'rgba(220,190,246,.75)', 'stroke-width': 3.5, 'stroke-linecap':'round'
      });
      g.append(main, shade, hi);
      return g;
    }

    function makeSuckers(parent, len, side, count) {
      for (let i=0; i<count; i++) {
        const t = (i + 1) / (count + 1);
        const cx = len * t;
        const cy = side * (6 + i*0.7);
        const rx = 6 - i * 0.5;
        const ry = 4 - i * 0.35;
        parent.append(el('ellipse', { class:'sucker', cx, cy, rx: Math.max(3.2, rx), ry: Math.max(2.2, ry)}));
      }
    }

    function buildTentacle(id, host, cfg) {
      const root = el('g', { id, 'data-rig':'tentacle', 'data-pivot-x':cfg.x, 'data-pivot-y':cfg.y });
      root.setAttribute('transform', `translate(${cfg.x} ${cfg.y}) rotate(${cfg.baseDeg})`);

      const b1 = makeSegment(cfg.l1, cfg.w1, id, 1);
      const b2wrap = el('g', { id:`${id}_joint_2` });
      b2wrap.setAttribute('transform', `translate(${cfg.l1-8} 0)`);
      const b2 = makeSegment(cfg.l2, cfg.w2, id, 2);

      const b3wrap = el('g', { id:`${id}_joint_3` });
      b3wrap.setAttribute('transform', `translate(${cfg.l2-6} 0)`);
      const b3 = makeSegment(cfg.l3, cfg.w3, id, 3);

      const suck1 = el('g'); makeSuckers(suck1, cfg.l1*0.9, cfg.suckerSide, 2);
      const suck2 = el('g'); makeSuckers(suck2, cfg.l2*0.86, cfg.suckerSide, 2);
      const suck3 = el('g'); makeSuckers(suck3, cfg.l3*0.84, cfg.suckerSide, 2);

      b1.append(suck1);
      b2.append(suck2);
      b3.append(suck3);

      b3wrap.append(b3);
      b2wrap.append(b2, b3wrap);
      root.append(b1, b2wrap);
      host.append(root);

      rigs.push({
        id, root, b2wrap, b3wrap,
        amp: cfg.amp, speed: cfg.speed, phase: cfg.phase,
        bend2: cfg.bend2, bend3: cfg.bend3,
        baseDeg: cfg.baseDeg
      });
    }

    const backHost = document.getElementById('tentacles_back');
    const frontHost = document.getElementById('tentacles_front');

    const defs = [
      {id:'tentacle_01', host:backHost, x:252, y:380, baseDeg:194, l1:86, l2:70, l3:58, w1:25, w2:20, w3:15, suckerSide: 1, amp:7, speed:1.1, phase:0.0, bend2:0.64, bend3:0.76},
      {id:'tentacle_02', host:backHost, x:286, y:396, baseDeg:166, l1:92, l2:76, l3:62, w1:27, w2:22, w3:17, suckerSide: 1, amp:8, speed:1.25, phase:0.8, bend2:0.70, bend3:0.82},
      {id:'tentacle_03', host:frontHost,x:320, y:404, baseDeg:143, l1:98, l2:82, l3:66, w1:29, w2:23, w3:18, suckerSide: 1, amp:10,speed:1.45, phase:1.6, bend2:0.74, bend3:0.88},
      {id:'tentacle_04', host:frontHost,x:368, y:412, baseDeg:110, l1:98, l2:84, l3:66, w1:29, w2:23, w3:18, suckerSide: 1, amp:7, speed:1.18, phase:2.2, bend2:0.68, bend3:0.84},
      {id:'tentacle_05', host:frontHost,x:432, y:412, baseDeg:70,  l1:98, l2:84, l3:66, w1:29, w2:23, w3:18, suckerSide:-1, amp:7, speed:1.18, phase:2.9, bend2:0.68, bend3:0.84},
      {id:'tentacle_06', host:frontHost,x:480, y:404, baseDeg:38,  l1:98, l2:82, l3:66, w1:29, w2:23, w3:18, suckerSide:-1, amp:10,speed:1.45, phase:3.7, bend2:0.74, bend3:0.88},
      {id:'tentacle_07', host:backHost, x:514, y:396, baseDeg:14,  l1:92, l2:76, l3:62, w1:27, w2:22, w3:17, suckerSide:-1, amp:8, speed:1.25, phase:4.5, bend2:0.70, bend3:0.82},
      {id:'tentacle_08', host:backHost, x:548, y:380, baseDeg:-14, l1:86, l2:70, l3:58, w1:25, w2:20, w3:15, suckerSide:-1, amp:7, speed:1.1, phase:5.2, bend2:0.64, bend3:0.76}
    ];

    defs.forEach(cfg => buildTentacle(cfg.id, cfg.host, cfg));

    const pupils = [document.getElementById('eye_left_pupil'), document.getElementById('eye_right_pupil')];
    const mouth = document.getElementById('mouth_open');
    const tongue = document.getElementById('tongue');

    const state = { current: 'idle', lastBlink: 0, talking: false, waving: true };

    function updateState(t) {
      if (t - state.lastBlink > 3.5) {
        state.current = 'blink';
        state.lastBlink = t;
        setTimeout(() => { state.current = 'idle'; }, 140);
      }
      if (Math.floor(t) % 9 === 4) state.current = 'talk';
      if (Math.floor(t) % 9 === 6) state.current = 'idle';
    }

    function frame(ms) {
      const t = ms * 0.001;
      updateState(t);

      rigs.forEach(r => {
        const w = Math.sin(t * r.speed + r.phase);
        const rootRot = r.baseDeg + w * r.amp;
        const j2 = Math.sin(t * (r.speed*1.7) + r.phase*1.2) * (r.amp * r.bend2);
        const j3 = Math.sin(t * (r.speed*2.1) + r.phase*1.7) * (r.amp * r.bend3);
        const ty = -Math.abs(w) * 1.4;
        r.root.setAttribute('transform', `translate(${defs.find(d=>d.id===r.id).x} ${defs.find(d=>d.id===r.id).y + ty}) rotate(${rootRot})`);
        r.b2wrap.setAttribute('transform', `translate(${defs.find(d=>d.id===r.id).l1-8} 0) rotate(${j2})`);
        r.b3wrap.setAttribute('transform', `translate(${defs.find(d=>d.id===r.id).l2-6} 0) rotate(${j3})`);
      });

      const lookX = Math.sin(t*0.5)*2.4;
      const lookY = Math.sin(t*0.33+0.8)*1.8;
      pupils[0].setAttribute('cx', (342 + lookX).toFixed(2));
      pupils[0].setAttribute('cy', (281 + lookY).toFixed(2));
      pupils[1].setAttribute('cx', (466 + lookX).toFixed(2));
      pupils[1].setAttribute('cy', (281 + lookY).toFixed(2));

      if (state.current === 'talk') {
        const m = 12 + Math.abs(Math.sin(t*8))*9;
        mouth.setAttribute('d', `M348 338 C360 ${362+m} 440 ${362+m} 452 338 C444 ${374+m} 356 ${374+m} 348 338 Z`);
        tongue.setAttribute('d', `M371 ${358+m*0.35} C383 ${374+m*0.35} 417 ${374+m*0.35} 429 ${358+m*0.35}`);
      } else {
        mouth.setAttribute('d', 'M348 338 C360 362 440 362 452 338 C444 374 356 374 348 338 Z');
        tongue.setAttribute('d', 'M371 358 C383 374 417 374 429 358');
      }

      if (state.current === 'blink') {
        document.getElementById('eye_left').setAttribute('transform', 'scale(1 0.2) translate(0 1080)');
        document.getElementById('eye_right').setAttribute('transform', 'scale(1 0.2) translate(0 1080)');
      } else {
        document.getElementById('eye_left').setAttribute('transform', '');
        document.getElementById('eye_right').setAttribute('transform', '');
      }

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
