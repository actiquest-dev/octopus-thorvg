<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление пользователями</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .users-section {
            margin-bottom: 30px;
        }

        .section-title {
            color: #667eea;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .user-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .user-meta {
            font-size: 12px;
            color: #999;
        }

        .delete-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
        }

        .delete-btn:active {
            transform: translateY(0);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .refresh-btn {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .refresh-btn:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f0f4ff;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #e0e7ff;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👤 Управление пользователями</h1>
        <p class="subtitle">Просмотр и удаление пользователей из базы данных</p>

        <div id="alerts"></div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalUsers">0</div>
                <div class="stat-label">Всего пользователей</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalFaces">0</div>
                <div class="stat-label">Лиц в базе</div>
            </div>
        </div>

        <div class="users-section">
            <div class="section-title">📋 Список пользователей</div>
            <div id="usersList" class="user-list">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="refresh-btn" onclick="loadUsers()">🔄 Обновить</button>
        </div>
    </div>

    <script>
        async function loadUsers() {
            const usersList = document.getElementById('usersList');
            usersList.innerHTML = '<div class="loading"><div class="spinner"></div><p>Загрузка...</p></div>';

            try {
                const response = await fetch('/api/admin/users');
                const data = await response.json();

                if (!data.success) {
                    showAlert('Ошибка: ' + data.error, 'error');
                    usersList.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>Ошибка загрузки</p></div>';
                    return;
                }

                const users = data.users || [];
                const stats = data.stats || {};

                // Обновить статистику
                document.getElementById('totalUsers').textContent = stats.total_users || 0;
                document.getElementById('totalFaces').textContent = stats.total_profiles || 0;

                // Отобразить пользователей
                if (users.length === 0) {
                    usersList.innerHTML = '<div class="empty-state"><div class="empty-icon">😴</div><p>Нет пользователей</p></div>';
                    return;
                }

                usersList.innerHTML = users.map(user => `
                    <div class="user-item">
                        <div class="user-info">
                            <div class="user-name">👤 ${user.name}</div>
                            <div class="user-meta">
                                ID: ${user.user_id.slice(0, 8)}... |
                                ${user.face_count} лиц |
                                Создан: ${new Date(user.created_at).toLocaleDateString('ru-RU')}
                            </div>
                        </div>
                        <button class="delete-btn" onclick="deleteUser('${user.user_id}', '${user.name}')">
                            🗑️ Удалить
                        </button>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка при загрузке: ' + error.message, 'error');
                usersList.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><p>Ошибка подключения</p></div>';
            }
        }

        async function deleteUser(userId, userName) {
            if (!confirm(`⚠️ Вы уверены что хотите удалить пользователя "${userName}"? Это действие необратимо.`)) {
                return;
            }

            try {
                const response = await fetch('/api/admin/users/' + userId, {
                    method: 'DELETE'
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(`✅ Пользователь "${userName}" удалён`, 'success');
                    await loadUsers();
                } else {
                    showAlert('Ошибка: ' + data.error, 'error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showAlert('Ошибка при удалении: ' + error.message, 'error');
            }
        }

        function showAlert(message, type) {
            const alertsDiv = document.getElementById('alerts');
            const alert = document.createElement('div');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alertsDiv.appendChild(alert);

            setTimeout(() => alert.remove(), 4000);
        }

        // Загрузить пользователей при открытии страницы
        loadUsers();
    </script>
</body>
</html>
