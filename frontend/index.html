<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐙 Octopus Avatar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;

        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 1200px;

        }

        h1 {
            color: white;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;

        }

        .avatar-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 350px;

        }

        #avatar-canvas, #octo-canvas {
            border-radius: 10px;
            background: linear-gradient(180deg, #e0f7fa 0%, #b2ebf2 100%);
            display: block;
        }

        #octo-canvas {
            display: none;
        }

        #octobuss-box {
            display: none;
            width: 280px;
            height: 280px;
            border-radius: 10px;
            background: linear-gradient(180deg, #e0f7fa 0%, #b2ebf2 100%);
        }

        .av-switch {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .av-switch button {
            flex: 1;
            padding: 6px 10px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 20px;
            border: 2px solid rgba(102, 126, 234, 0.4);
            background: #f5f5f5;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .av-switch button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: transparent;
        }

        .av-switch button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #tag-display {
            margin-top: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            color: #667eea;
        }

        #emotion-display,
        #action-display {
            font-size: 14px;
        }

        .tag-sep {
            opacity: 0.6;
        }

        #animation-test {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }

        #animation-test select,
        #animation-test button {
            font-size: 12px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid rgba(102, 126, 234, 0.4);
            background: #ffffff;
            color: #2d2d2d;
        }

        .video-container {
            background: #1a1a2e;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;

        }

        .video-container video {
            max-width: 100%;
            max-height: 310px;
            border-radius: 10px;

        }

        .video-container p {
            color: #666;
        }

        .chat-section {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            gap: 10px;

        }

        .chat-container {
            background: white;
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;

        }

        .message {
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 80%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;

        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        .user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;

        }

        .assistant {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;

        }

        .system {
            background: #e8f4f8;
            color: #666;
            font-size: 12px;
            align-self: center;

        }

        .chat-input {
            display: flex;
            gap: 10px;
        }

        #chatInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 15px;
            transition: border-color 0.3s;

        }

        #chatInput:focus {
            outline: none;
            border-color: #667eea;

        }

        #sendBtn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;

        }

        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);

        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            grid-column: 1 / -1;
            flex-wrap: wrap;

        }

        .controls button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            transition: all 0.3s;

        }

        .controls button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);

        }

        .controls button:disabled {
            background: #ccc;
            transform: none;
            box-shadow: none;

        }

        .controls button.active {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            animation: pulse 1.5s infinite;

        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4);
            }

            50% {
                box-shadow: 0 0 0 10px rgba(231, 76, 60, 0);
            }

        }

        .status {
            color: white;
            text-align: center;
            font-size: 14px;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.3);

        }

        #debug {
            color: rgba(255, 255, 255, 0.7);
            font-size: 11px;
            font-family: monospace;
            text-align: center;

        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🐙 Octopus Avatar</h1>

        <div class="main-content">
            <div class="avatar-container">
                <canvas id="avatar-canvas" width="280" height="280"></canvas>
                <canvas id="octo-canvas"   width="280" height="280"></canvas>
                <div id="octobuss-box"></div>
                <div class="av-switch">
                    <button id="avBtn-legacy" class="active" onclick="switchAvatar('legacy')">🎨 Canvas</button>
                    <button id="avBtn-thorvg" disabled     onclick="switchAvatar('thorvg')">🐙 ThorVG</button>
                    <button id="avBtn-octobuss" disabled   onclick="switchAvatar('octobuss')">🦑 SVG Rig</button>
                </div>
                <div id="tag-display">

                </div>
                <div id="animation-test">
                    <select id="test-emotion">
                        <option value="neutral">emotion: neutral</option>
                        <option value="happy">emotion: happy</option>
                        <option value="sad">emotion: sad</option>
                        <option value="angry">emotion: angry</option>
                        <option value="excited">emotion: excited</option>
                        <option value="calm">emotion: calm</option>
                        <option value="curious">emotion: curious</option>
                        <option value="confused">emotion: confused</option>
                        <option value="sarcastic">emotion: sarcastic</option>
                        <option value="proud">emotion: proud</option>
                        <option value="tender">emotion: tender</option>

                    </select>
                    <button onclick="runEmotionTest()">Test Emotion</button>
                    <select id="test-action">
                        <option value="none">action: none</option>
                        <option value="sing">action: sing</option>
                        <option value="laugh">action: laugh</option>
                        <option value="whisper">action: whisper</option>
                        <option value="shout">action: shout</option>
                        <option value="heart">action: heart</option>
                        <option value="wave">action: wave</option>
                        <option value="clap">action: clap</option>
                        <option value="point">action: point</option>
                        <option value="hug">action: hug</option>
                        <option value="shrug">action: shrug</option>
                        <option value="wipe">action: wipe</option>
                        <option value="sfx_pop">action: sfx_pop</option>
                        <option value="sfx_sparkle">action: sfx_sparkle</option>
                        <option value="sfx_boop">action: sfx_boop</option>
                        <option value="sfx_wave">action: sfx_wave</option>
                        <option value="sfx_spin">action: sfx_spin</option>
                        <option value="sfx_tear">action: sfx_tear</option>
                        <option value="sfx_sweat">action: sfx_sweat</option>
                        <option value="sfx_heart">action: sfx_heart</option>
                        <option value="sfx_bubble">action: sfx_bubble</option>
                        <option value="walk_right">action: walk_right</option>
                        <option value="walk_left">action: walk_left</option>
                        <option value="scratch_nose">action: scratch_nose</option>
                        <option value="turn_around">action: turn_around</option>
                        <option value="stroll_scratch">action: stroll_scratch</option>

                    </select>
                    <button onclick="runActionTest()">Test Action</button>
                </div>
            </div>

            <div class="video-container" id="videoContainer">
                <p>📷 Камера выключена</p>
            </div>

            <div class="chat-section">
                <div class="chat-container" id="chatContainer"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Введите сообщение...">
                    <button id="sendBtn" onclick="sendTextMessage()">Отправить</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button id="audioBtn" onclick="toggleAudio()" disabled>🎤 Микрофон</button>
            <button id="videoBtn" onclick="toggleVideo()" disabled>📹 Камера</button>
        </div>

        <div class="status" id="status">Подключение...</div>
        <div id="debug"></div>
    </div>

    <!-- MediaPipe Face Mesh for Face ID detection -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

    <script src="thorvg.js"></script>
    <script src="octopus_paths.js?v=3"></script>
    <script src="octopus_animator.js?v=3"></script>
    <script src="octopuzz_avatar.js?v=61"></script>
    <script src="octobuss_avatar.js?v=4"></script>
    <script src="geminilive.js?v=6"></script>
    <script src="mediaUtils.js?v=5"></script>
    <script src="tools.js?v=3"></script>
    <script>
        // ============== ANIMATOR ==============
        const canvas = document.getElementById("avatar-canvas");
        if (!canvas) throw new Error("Canvas #avatar-canvas not found");
        const _legacyAnimator = new OctopusAnimator(canvas);

        // Proxy: все существующие вызовы window.octopusAnimator работают без изменений.
        // Активный аватар меняется через switchAvatar().
        const avatarProxy = {
            _active: _legacyAnimator,
            handleCommand(cmd) { this._active?.handleCommand?.(cmd); },
            setEmotion(e)      { this._active?.setEmotion?.(e); },
            blink()            { this._active?.blink?.(); },
            activateAction(a, d) { this._active?.activateAction?.(a, d); },
            triggerFxFromAction(a) { this._active?.triggerFxFromAction?.(a); },
            triggerGesture(n, o)   { this._active?.triggerGesture?.(n, o); },
        };
        window.octopusAnimator = avatarProxy;
        const animator = avatarProxy; // для testAnimation

        // Переключение аватаров
        function switchAvatar(to) {
            const legacyCanvas = document.getElementById('avatar-canvas');
            const thorvgCanvas = document.getElementById('octo-canvas');
            const octobussBox  = document.getElementById('octobuss-box');
            legacyCanvas.style.display = 'none';
            thorvgCanvas.style.display = 'none';
            octobussBox.style.display  = 'none';
            if (to === 'legacy') {
                legacyCanvas.style.display = 'block';
                avatarProxy._active = _legacyAnimator;
            } else if (to === 'thorvg' && window._octopuzzAvatar) {
                thorvgCanvas.style.display = 'block';
                avatarProxy._active = window._octopuzzAvatar;
            } else if (to === 'octobuss' && window._octobussAvatar) {
                octobussBox.style.display = 'block';
                avatarProxy._active = window._octobussAvatar;
            } else {
                legacyCanvas.style.display = 'block';
                avatarProxy._active = _legacyAnimator;
                to = 'legacy';
            }
            document.getElementById('avBtn-legacy').classList.toggle('active', to === 'legacy');
            document.getElementById('avBtn-thorvg').classList.toggle('active', to === 'thorvg');
            document.getElementById('avBtn-octobuss').classList.toggle('active', to === 'octobuss');
        }

        // SVG-риг Octobuss (щупальца-кости + липсинк)
        (async () => {
            try {
                const octobuss = new OctobussAvatar('octobuss-box', 'octobuss.rigged.svg');
                const t0 = Date.now();
                while (!octobuss.ready && Date.now() - t0 < 10000) {
                    await new Promise(r => setTimeout(r, 100));
                }
                if (octobuss.ready) {
                    window._octobussAvatar = octobuss;
                    document.getElementById('avBtn-octobuss').disabled = false;
                    console.log('✅ OctobussAvatar (SVG rig) ready');
                } else {
                    console.warn('⚠️ OctobussAvatar не готов за 10s');
                }
            } catch (err) {
                console.warn('⚠️ OctobussAvatar init failed:', err);
            }
        })();

        // Запустить ThorVG аватар асинхронно — когда готов, разблокировать кнопку
        (async () => {
            try {
                const octoAvatar = new OctopuzzAvatar('octo-canvas', 'octopuzz.svg', {
                    width: 280, height: 280, renderer: 'sw'
                });
                // Ждём инициализации (max 10s)
                const t0 = Date.now();
                while (!octoAvatar.ready && Date.now() - t0 < 10000) {
                    await new Promise(r => setTimeout(r, 100));
                }
                if (octoAvatar.ready) {
                    window._octopuzzAvatar = octoAvatar;
                    document.getElementById('avBtn-thorvg').disabled = false;
                    console.log('✅ OctopuzzAvatar (ThorVG) ready');
                } else {
                    console.warn('⚠️ OctopuzzAvatar не готов за 10s');
                }
            } catch (err) {
                console.warn('⚠️ OctopuzzAvatar init failed:', err);
            }
        })();

        const emotionEmojis = {
            calm: '😊',
            neutral: '🙂',
            happy: '😄',
            excited: '🤩',
            sad: '😢',
            angry: '😠',
            confused: '🤔',
            curious: '🧐',
            sarcastic: '😏',
            proud: '😌',
            tender: '🥹',
            playful: '😜',
            empathetic: '🤗',
            surprised: '😮',
            nervous: '😰'
        };

        const actionEmojis = {
            none: '✨',
            sing: '🎵',
            laugh: '😂',
            whisper: '🤫',
            shout: '📢',
            heart: '💖',
            wave: '👋',
            clap: '👏',
            point: '👉',
            hug: '🫂',
            shrug: '🤷',
            sfx_pop: '💥',
            sfx_sparkle: '✨',
            sfx_boop: '🔔',
            sfx_wave: '🌊',
            sfx_spin: '🌀',
            sfx_tear: '💧',
            sfx_sweat: '💦',
            sfx_heart: '💖',
            walk_right: '🚶➡️',
            walk_left: '⬅️🚶',
            scratch_nose: '🤏',
            turn_around: '🔄',
            stroll_scratch: '🚶🤏',
            sfx_bubble: '🫧',
            wipe: '🧽',
            photobooth: '📸'
        };

        // ============== RAG TOOLS (для tool calling) ==============
        class GetUserInfoTool extends FunctionCallDefinition {
            constructor() {
                super(
                    "get_user_info",
                    "Get information about current user from database (name, interaction count, average emotion, last seen)",
                    {
                        type: "object",
                        properties: {}
                    },
                    []
                );
            }

            async functionToCall(parameters) {
                if (!state.currentUserId) {
                    return { error: "No user ID in context" };
                }

                try {
                    const response = await fetch(`/api/face/profile/${state.currentUserId}`);
                    const data = await response.json();
                    console.log("🔍 get_user_info result:", data);

                    if (response.ok) {
                        return {
                            name: data.name,
                            interaction_count: data.interaction_count,
                            average_emotion: data.average_emotion,
                            last_seen: data.last_seen,
                            profile_data: data.profile_data
                        };
                    } else {
                        return { error: data.error || "User not found" };
                    }
                } catch (e) {
                    console.error("❌ get_user_info error:", e);
                    return { error: e.message };
                }
            }
        }

        class GetConversationHistoryTool extends FunctionCallDefinition {
            constructor() {
                super(
                    "get_conversation_history",
                    "Get recent conversation history with current user (last 10 messages)",
                    {
                        type: "object",
                        properties: {}
                    },
                    []
                );
            }

            async functionToCall(parameters) {
                if (!state.currentUserId) {
                    return { error: "No user ID in context" };
                }

                try {
                    const response = await fetch(`/api/face/profile/${state.currentUserId}`);
                    const data = await response.json();
                    console.log("📖 get_conversation_history result:", data.conversation_history);

                    if (response.ok) {
                        const history = data.conversation_history || [];
                        return {
                            messages: history.slice(-10),
                            total_messages: history.length
                        };
                    } else {
                        return { error: data.error || "User not found" };
                    }
                } catch (e) {
                    console.error("❌ get_conversation_history error:", e);
                    return { error: e.message };
                }
            }
        }

        class SaveInteractionTool extends FunctionCallDefinition {
            constructor() {
                super(
                    "save_interaction",
                    "Save current interaction to user profile (avatar message, emotion, action)",
                    {
                        type: "object",
                        properties: {
                            message: { type: "string", description: "Message text to save" },
                            emotion: { type: "string", description: "Emotion during this interaction" },
                            action: { type: "string", description: "Action performed" }
                        }
                    },
                    ["message"]
                );
            }

            async functionToCall(parameters) {
                if (!state.currentUserId) {
                    return { error: "No user ID in context" };
                }

                try {
                    const response = await fetch(`/api/log-conversation/${state.currentUserId}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            text: parameters.message,
                            speaker: "avatar",
                            emotion: parameters.emotion,
                            action: parameters.action
                        })
                    });

                    const data = await response.json();
                    console.log("💾 save_interaction result:", data);

                    if (response.ok) {
                        return { status: "saved", message: parameters.message };
                    } else {
                        return { error: data.error || "Failed to save" };
                    }
                } catch (e) {
                    console.error("❌ save_interaction error:", e);
                    return { error: e.message };
                }
            }
        }

        class RegisterUserTool extends FunctionCallDefinition {
            constructor() {
                super(
                    "register_new_user",
                    "Register a new user by taking photos for face recognition (start photobooth session). Call this when user introduces themselves.",
                    {
                        type: "object",
                        properties: {
                            user_name: { type: "string", description: "Name of the new user to register" }
                        }
                    },
                    ["user_name"]
                );
            }

            async functionToCall(parameters) {
                const userName = parameters.user_name;
                console.log(`📸 RegisterUserTool: Starting photobooth for ${userName}`);

                if (!state.videoStreamer) {
                    return { error: "Camera not enabled. Please enable camera first." };
                }

                try {
                    // 🎬 Запустить photobooth
                    await startPhotoboothSession(userName, `Спасибо, ${userName}! Сейчас запоминаю твоё лицо...`);

                    return {
                        status: "registered",
                        user_name: userName,
                        message: `✅ ${userName} зарегистрирован(а)! Я запомнил твоё лицо! 🐙`
                    };
                } catch (e) {
                    console.error("❌ register_new_user error:", e);
                    return { error: e.message };
                }
            }
        }

        class EmitTagsTool extends FunctionCallDefinition {
            constructor() {
                super(
                    "emit_tags",
                    "Emit emotion/action tags for avatar animation without speaking them",
                    {
                        type: "object",
                        properties: {
                            emotion: { type: "string" },
                            action: { type: "string" }
                        }
                    },
                    ["emotion", "action"]
                );
            }

            functionToCall(parameters) {
                const emotion = (parameters?.emotion || "").toLowerCase();
                const action = (parameters?.action || "").toLowerCase();
                if (emotion) updateEmotion(emotion);
                if (action) updateAction(action);
                if (action) playSfx(action);
                if (window.octopusAnimator && typeof window.octopusAnimator.handleCommand === "function") {
                    if (emotion) {
                        window.octopusAnimator.handleCommand({ cmd: "emotion", emotion });
                    }
                    if (action && action !== "none") {
                        window.octopusAnimator.handleCommand({ cmd: "action", action, duration_ms: 1400 });
                    }
                }
                if (emotion || action) {
                    sendTagsToBackend(emotion, action);
                }
            }
        }


        function updateEmotion(emotion) {
            const emoji = emotionEmojis[emotion] || '😊';
            document.getElementById('emotion-display').textContent = `emotion: ${emoji} ${emotion}`;
            playEmotionSfx(emotion);
        }

        let currentAction = null;

        function updateAction(action) {
            const emoji = actionEmojis[action] || '✨';
            document.getElementById('action-display').textContent = `action: ${emoji} ${action}`;
            currentAction = action || null;
            playActionSfx(action);
        }

        const sfxUrlCache = new Map();
        const sfxAudioCache = new Map();
        const sfxLastPlayed = new Map();
        const emotionSfxQueries = {
            happy: ["bright chime", "magic sparkle", "happy bell"],
            sad: ["soft chime", "low bell", "gentle tone"],
            angry: ["impact thud", "short whoosh", "hit"],
            neutral: ["soft whoosh", "light tap", "subtle click"],
            excited: ["sparkle", "rising chime", "bright bell"],
            calm: ["soft wind", "breath", "gentle whoosh"],
            curious: ["boop", "sparkle", "bloop"],
            confused: ["boing", "glitch", "question ding"],
            sarcastic: ["rimshot", "snare hit", "short hit"],
            proud: ["fanfare", "trumpet", "victory chime"],
            tender: ["soft harp", "gentle chime", "warm bell"],
            playful: ["cartoon pop", "boing", "bubble pop"]
        };
        const actionSfxQueries = {
            sing: [
                "short melody",
                "music jingle",
                "harp arpeggio",
                "musical flourish",
                "ukulele riff",
                "music box",
                "whistle melody",
                "vocal riff",
                "jingle",
                "short tune"
            ],
            laugh: ["cartoon laugh", "giggle", "short chuckle"],
            whisper: ["soft breath", "gentle whoosh", "whisper"],
            shout: ["short shout", "impact hit", "sharp whoosh"],
            wave: ["whoosh", "swish", "air swipe"],
            clap: ["hand clap", "clap", "applause single"],
            point: ["tap", "click", "short tick"],
            hug: ["soft thump", "warm thud", "gentle bump"],
            shrug: ["boing", "soft pop", "comic shrug"],
            heart: ["sparkle", "magic chime", "warm bell"],
            wipe: ["swish", "wipe", "soft whoosh"],
            photobooth: ["camera shutter", "camera click", "photo shutter sound"]
        };

        function shouldPlaySfx(action) {
            const now = Date.now();
            const last = sfxLastPlayed.get(action) || 0;
            if (now - last < 250) return false;
            sfxLastPlayed.set(action, now);
            return true;
        }

        function playWithLimit(audio, maxMs, fadeOutMs = 0) {
            if (!audio) return;
            if (audio._sfxTimer) {
                clearTimeout(audio._sfxTimer);
            }
            audio._sfxTimer = setTimeout(() => {
                try {
                    if (fadeOutMs > 0) {
                        const startVol = audio.volume ?? 1;
                        const steps = 8;
                        let step = 0;
                        const stepMs = Math.max(30, Math.floor(fadeOutMs / steps));
                        const fadeTimer = setInterval(() => {
                            step += 1;
                            audio.volume = Math.max(0, startVol * (1 - step / steps));
                            if (step >= steps) {
                                clearInterval(fadeTimer);
                                audio.pause();
                                audio.volume = startVol;
                            }
                        }, stepMs);
                        return;
                    }
                    audio.pause();
                } catch (e) {
                    // ignore
                }
            }, maxMs);
        }

        async function fetchSfxUrl(action) {
            if (sfxUrlCache.has(action)) return sfxUrlCache.get(action);
            const res = await fetch(`/sfx/search?action=${encodeURIComponent(action)}`);
            if (!res.ok) return null;
            const data = await res.json();
            if (!data.url) return null;
            sfxUrlCache.set(action, data.url);
            return data.url;
        }

        async function fetchSfxUrlByQuery(query, cacheKey, opts = null) {
            const bypassCache = cacheKey.startsWith("act:sing");
            if (!bypassCache && sfxUrlCache.has(cacheKey)) return sfxUrlCache.get(cacheKey);
            const params = new URLSearchParams({ q: query });
            if (opts && opts.minDuration != null) params.set("min_duration", String(opts.minDuration));
            if (opts && opts.maxDuration != null) params.set("max_duration", String(opts.maxDuration));
            const res = await fetch(`/sfx/search?${params.toString()}`);
            if (!res.ok) return null;
            const data = await res.json();
            if (!data.url) return null;
            if (!bypassCache) {
                sfxUrlCache.set(cacheKey, data.url);
            }
            return data.url;
        }

        function pickRandom(items) {
            if (!items || items.length === 0) return null;
            return items[Math.floor(Math.random() * items.length)];
        }

        async function playSfx(action) {
            if (!action) return;
            if (!action.startsWith("sfx_") && action !== "wipe") return;
            if (!shouldPlaySfx(action)) return;
            const url = await fetchSfxUrl(action);
            if (!url) return;
            let audio = sfxAudioCache.get(action);
            if (!audio || audio.src !== url) {
                audio = new Audio(url);
                audio.preload = "auto";
                audio.volume = 0.6;
                sfxAudioCache.set(action, audio);
            }
            try {
                audio.currentTime = 0;
                await audio.play();
                playWithLimit(audio, 2500, 350);
            } catch (e) {
                console.log("🔇 SFX play failed", e);
            }
        }

        async function playEmotionSfx(emotion) {
            if (!emotion) return;
            if (currentAction && currentAction !== "none") return;
            const queries = emotionSfxQueries[emotion];
            if (!queries || queries.length === 0) return;
            const query = pickRandom(queries);
            if (!query) return;
            const rateKey = `emo:${emotion}`;
            if (!shouldPlaySfx(rateKey)) return;
            const cacheKey = `emo:${emotion}:${query}`;
            const durationOpts = currentAction === "sing" ? { minDuration: 4, maxDuration: 7 } : null;
            const url = await fetchSfxUrlByQuery(query, cacheKey, durationOpts);
            if (!url) return;
            let audio = sfxAudioCache.get(cacheKey);
            if (!audio || audio.src !== url) {
                audio = new Audio(url);
                audio.preload = "auto";
                audio.volume = 0.35;
                sfxAudioCache.set(cacheKey, audio);
            }
            try {
                audio.currentTime = 0;
                await audio.play();
                playWithLimit(audio, 2500, 350);
            } catch (e) {
                console.log("🔇 emotion SFX play failed", e);
            }
        }

        async function playActionSfx(action) {
            if (!action) return;
            if (action.startsWith("sfx_") || action === "wipe") return;
            const queries = actionSfxQueries[action];
            if (!queries || queries.length === 0) return;
            const query = pickRandom(queries);
            if (!query) return;
            const rateKey = `act:${action}`;
            if (!shouldPlaySfx(rateKey)) return;
            const cacheKey = `act:${action}:${query}`;
            const url = await fetchSfxUrlByQuery(query, cacheKey);
            if (!url) return;
            let audio = sfxAudioCache.get(cacheKey);
            if (!audio || audio.src !== url) {
                audio = new Audio(url);
                audio.preload = "auto";
                audio.volume = 0.45;
                sfxAudioCache.set(cacheKey, audio);
            }
            try {
                audio.currentTime = 0;
                await audio.play();
                const maxMs = action === "sing" ? 7000 : 2500;
                const fadeMs = action === "sing" ? 700 : 350;
                playWithLimit(audio, maxMs, fadeMs);
            } catch (e) {
                console.log("🔇 action SFX play failed", e);
            }
        }

        function sendTagsToBackend(emotion, action) {
            if (!state.geminiClient || !state.geminiClient.connected) return;
            const now = Date.now();
            const key = `${emotion || ""}|${action || ""}`;
            // Увеличен интервал троттлинга с 1500ms до 2000ms для снижения нагрузки
            if (state.lastTag && state.lastTag.key === key && (now - state.lastTag.ts) < 2000) {
                return;
            }
            state.lastTag = { key, ts: now };
            state.geminiClient.sendMessage({
                client_tag: {
                    emotion: emotion || "",
                    action: action || "",
                    duration_ms: 1400
                }
            });
        }

        function sendGazeFrame(imageB64, mime, w, h) {
            const ws = ensureGazeSocket();
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const now = Date.now();
            // Throttle gaze frames to avoid queue buildup.
            if (now - state.lastGazeSentMs < 83) return; // ~12 fps, чтобы совпадало с захватом
            state.lastGazeSentMs = now;
            ws.send(JSON.stringify({
                gaze_frame: {
                    image_b64: imageB64,
                    mime: mime || "image/jpeg",
                    w: w || 0,
                    h: h || 0,
                    ts_ms: now
                }
            }));
        }

        function getGazeWsUrl() {
            const proto = location.protocol === "https:" ? "wss" : "ws";
            // Connecting directly to 8082 to avoid app.py proxy overhead and interference
            const hostname = location.hostname;
            return `${proto}://${hostname}:8082/gaze-client`;
        }

        function ensureGazeSocket() {
            if (state.gazeSocket && state.gazeSocket.readyState === WebSocket.OPEN) {
                return state.gazeSocket;
            }
            if (state.gazeSocketConnecting) {
                return state.gazeSocket;
            }
            const url = getGazeWsUrl();
            state.gazeSocketConnecting = true;
            state.gazeSocket = new WebSocket(url);
            state.gazeSocket.onopen = () => {
                state.gazeSocketConnecting = false;
                console.log("👁️ gaze socket open");
            };
            state.gazeSocket.onerror = (e) => {
                state.gazeSocketConnecting = false;
                console.log("👁️ gaze socket error", e);
            };
            state.gazeSocket.onclose = (e) => {
                state.gazeSocketConnecting = false;
                console.log("👁️ gaze socket close", e.code, e.reason);
                state.gazeSocket = null;
            };
            // 🔥 КРИТИЧНО: Обработать render_packet сообщения из timeline-sync
            state.gazeSocket.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === "render_packet" && msg.packet) {
                        const packet = msg.packet;
                        // Логирование для отладки
                        if (packet.cmd === "audio_sync") {
                            if (window.__lipDebug) {
                                console.log(`🔊 audio_sync from timeline-sync (raw):`, {
                                    cmd: packet.cmd,
                                    start_s: packet.start_s,
                                    duration_s: packet.duration_s,
                                    jaw: packet.jaw ? { step_ms: packet.jaw.step_ms, values_len: packet.jaw.values?.length || 0 } : null,
                                    viseme_proxy: packet.viseme_proxy ? { step_ms: packet.viseme_proxy.step_ms, values_len: packet.viseme_proxy.values?.length || 0 } : null,
                                });
                            } else {
                                console.log(`🔊 audio_sync from timeline-sync: start_s=${packet.start_s?.toFixed(3)}, duration=${packet.duration_s?.toFixed(3)}, jaw=${packet.jaw?.values?.length}, viseme=${packet.viseme_proxy?.values?.length}`);
                            }
                        }
                        // Передать аниматору
                        if (window.octopusAnimator) {
                            window.octopusAnimator.handleCommand(packet);
                        }
                    }
                } catch (e) {
                    console.error("👁️ error processing gaze message:", e);
                }
            };
            return state.gazeSocket;
        }

        // ============== STATE ==============
        const state = {
            geminiClient: null,
            audioStreamer: null,
            audioPlayer: null,
            videoStreamer: null,
            currentOutputMsg: null,
            outputTimer: null,

            audioResponseStarted: false,     // 🔥 Флаг для reset_audio при первом аудио ответе

        // ============== CHAT ==============
        function addMessage(text, type) {

        // ============== TEXT INPUT ==============
        let lastSentText = '';

        function sendTextMessage() {
            // DEBUG: логируем откуда вызывается
            console.log('📤 sendTextMessage called, stack:', new Error().stack.split('\n')[2]);

            const input = document.getElementById('chatInput');

            if (text === lastSentText && (now - lastSentTime) < 500) {
                console.log('⚠️ Duplicate message blocked, text:', text);
                return;

            lastSentText = text;
            lastSentTime = now;

            state.geminiClient.sendTextMessage(text);
            input.value = '';

        function getWsProxyUrl() {
            const override =
                window.WS_PROXY_URL ||
                window.__WS_PROXY_URL ||

            if (override) return override;
            const loc = window.location;
            if (loc.protocol === "https:") {

            }
            return `ws://${loc.host}/ws`;
        }

        // ============== GEMINI CONNECTION ==============
        async function connectGemini() {

                // Fetch config from server

                // Avoid auto-interrupting model responses while mic is streaming.
                state.geminiClient.activityHandling = "ACTIVITY_HANDLING_UNSPECIFIED";
                state.geminiClient.automaticActivityDetection = {
                    disabled: false,
                    silence_duration_ms: 1500,
                    prefix_padding_ms: 300,
                    end_of_speech_sensitivity: "END_SENSITIVITY_HIGH",
                    start_of_speech_sensitivity: "START_SENSITIVITY_HIGH"
                };
                state.geminiClient.systemInstructions = `Ты веселый дружелюбный осьминог. Отвечай коротко на русском.

Когда отвечаешь на сообщение пользователя — вызови emit_tags ОДИН РАЗ с emotion и action, подходящими к твоему ответу. Вызывай emit_tags только когда реально отвечаешь на вопрос или реагируешь на пользователя. НЕ вызывай emit_tags повторно и не вызывай его в ответ на результат tool call.

            } catch (err) {

        }

        function parseTagLines(text) {
            let emotion = null;
            let action = null;
            if (!text) return { emotion, action };
            const lines = text.split(/\r?\n/);
            for (const line of lines) {
                const t = line.trim();
                if (t.startsWith("EMOTION_TAG:")) {
                    emotion = t.split(":", 2)[1]?.trim() || emotion;
                } else if (t.startsWith("ACTION_TAG:")) {
                    action = t.split(":", 2)[1]?.trim() || action;
                }
            }
            return { emotion, action };
        }

        function stripTagLines(text) {
            if (!text) return "";
            const lines = text.split(/\r?\n/);
            const kept = lines.filter((l) => {
                const t = l.trim();
                return !t.startsWith("EMOTION_TAG:") && !t.startsWith("ACTION_TAG:");
            });
            return kept.join("\n");
        }

        // ============== MESSAGE HANDLER ==============
        function handleGeminiMessage(message) {
            switch (message.type) {
                case MultimodalLiveResponseType.TOOL_CALL: {
                    const toolCall = message.data || {};
                    const callEntries = [];
                    if (toolCall.functionCalls && Array.isArray(toolCall.functionCalls)) {
                        toolCall.functionCalls.forEach((c) => {
                            callEntries.push({
                                call: c,
                                id: c.id || c.callId || c.toolCallId || toolCall.id || toolCall.callId || toolCall.toolCallId
                            });
                        });
                    } else if (toolCall.functionCall || toolCall.function_call) {
                        callEntries.push({
                            call: toolCall,
                            id: toolCall.id || toolCall.callId || toolCall.toolCallId
                        });
                    } else if (toolCall.calls && Array.isArray(toolCall.calls) && toolCall.calls.length) {
                        toolCall.calls.forEach((c) => {
                            callEntries.push({
                                call: c,
                                id: c.id || c.callId || c.toolCallId || toolCall.id || toolCall.callId || toolCall.toolCallId
                            });
                        });
                    }

                    (async () => {
                        for (const { call, id } of callEntries) {
                            const fc =
                                call.functionCall ||
                                call.function_call ||
                                (call.name ? { name: call.name, args: call.args || call.arguments || {} } : null);
                            if (!fc?.name) continue;
                            let args = fc.args || fc.arguments || {};
                            if (typeof args === "string") {
                                try { args = JSON.parse(args); } catch (_) { }
                            }
                            let result = { ok: true };
                            try {
                                const ret = await state.geminiClient.callFunction(fc.name, args);
                                if (ret !== undefined && ret !== null) result = ret;
                            } catch (e) {
                                console.error("❌ Tool error:", e);
                                result = { error: e.message };
                            }
                            if (id) {
                                state.geminiClient.sendToolResponse(id, fc.name, result);
                            }
                        }
                    })();
                    break;
                }
                case MultimodalLiveResponseType.INPUT_TRANSCRIPTION:
                    if (message.data.text) {
                        addMessage(message.data.text, "user");

                    }
                    break;

                case MultimodalLiveResponseType.OUTPUT_TRANSCRIPTION:
                    if (message.data.text) {
                        const tags = parseTagLines(message.data.text);
                        if (tags.emotion) updateEmotion(tags.emotion);
                        if (tags.action) updateAction(tags.action);
                        if (tags.emotion || tags.action) {
                            sendTagsToBackend(tags.emotion, tags.action);
                            // Play sound for photobooth action
                            if (tags.action === "photobooth") {
                                playActionSfx(tags.action);
                            }
                        }
                        const cleanText = stripTagLines(message.data.text);
                        if (cleanText.length === 0) break;
                        clearTimeout(state.outputTimer);

                        if (!state.currentOutputMsg) {
                            state.currentOutputMsg = addMessage(cleanText, "assistant");
                        } else {
                            appendToMessage(state.currentOutputMsg, cleanText);

                        }

                        if (message.data.finished) {
                            state.currentOutputMsg = null;
                        } else {
                            state.outputTimer = setTimeout(() => {
                                state.currentOutputMsg = null;
                            }, 300);

                        }
                    }
                    break;
                case MultimodalLiveResponseType.AUDIO:
                    if (state.audioPlayer && message.data) {
                        // 🔥 КРИТИЧНО: Сбросить audio timeline при первом аудио ответе
                        // Это нужно чтобы backend правильно рассчитывал start_s для виземов
                        if (!state.audioResponseStarted) {
                            state.audioResponseStarted = true;
                            // Отправить reset_audio в timeline-sync
                            setTimeout(() => {
                                if (state.gazeSocket && state.gazeSocket.readyState === WebSocket.OPEN) {
                                    state.gazeSocket.send(JSON.stringify({
                                        type: "reset_audio",
                                        client_id: "default"
                                    }));
                                    console.log("📢 Sent reset_audio to timeline-sync");
                                }
                            }, 0);
                        }

                        window.__octoAudioStartTs = performance.now();
                        // 🔥 Установить t0 ДО воспроизведения чтобы синхронизировать виземы
                        if (state.audioT0 == null) {
                            state.audioT0 = window.__octoAudioStartTs;
                        }
                        state.audioPlayer.play(message.data);

                    }
                    break;
                case MultimodalLiveResponseType.TURN_COMPLETE:
                case MultimodalLiveResponseType.INTERRUPTED:
                    // 🔥 Сбросить флаг при окончании разговора
                    state.audioResponseStarted = false;
                    break;

            }

        }

        // ============== INTERCEPT AVATAR COMMANDS ==============
        function interceptWebSocket() {
            if (!state.geminiClient || !state.geminiClient.webSocket) {
                setTimeout(interceptWebSocket, 500);
                return;
            }

            const ws = state.geminiClient.webSocket;
            if (ws._intercepted) return;
            ws._intercepted = true;

            ws.addEventListener('message', (event) => {
                // ===== AVATAR ANIMATION HOOK (JSON) =====
                try {
                    if (typeof event.data === "string") {
                        const msg = JSON.parse(event.data);

                        if (msg.type === "system_instruction_update") {
                            console.log("📝 System instruction update from backend:", msg.user_name);
                            if (msg.system_instruction && state.geminiClient) {
                                // Добавить информацию о tools к инструкции
                                const enhancedInstruction = msg.system_instruction + `

🧠 У тебя есть доступ к БД через tools:
- get_user_info() - получить информацию о пользователе
- get_conversation_history() - получить историю разговоров
- save_interaction(message, emotion, action) - сохранить в историю

Используй эти tools для лучшего взаимодействия с пользователем!`;

                                state.geminiClient.systemInstructions = enhancedInstruction;
                                console.log("✅ Updated Gemini system instructions for", msg.user_name);
                            }
                        }

                        if (msg.type === "photobooth_start") {
                            console.log("📸 Received photobooth_start from backend (disabled overlay)", msg);
                            // startPhotoboothSession(msg.user_name, msg.message);  // Disabled - only show action, no overlay
                        }

                        const a =
                            (msg && msg.serverContent && msg.serverContent.avatar)
                                ? msg.serverContent.avatar
                                : (msg ? msg.avatar : null);

                        if (a && window.octopusAnimator && typeof window.octopusAnimator.handleCommand === "function") {
                            // 🔥 Логирование для отладки липсинка
                            if (a.cmd === "audio_sync") {
                                console.log(`🔊 audio_sync: start_s=${a.start_s?.toFixed(3)}, duration=${a.duration_s?.toFixed(3)}, jaw=${a.jaw?.values?.length}, viseme=${a.viseme_proxy?.values?.length}`);
                            } else {
                                console.log("🎨 Avatar cmd:", a.cmd);
                            }

                            if (a.cmd === "action" && a.action) {
                                playSfx(a.action);
                            }
                            // align visemes with audio playback start (one-shot)
                            if (state.audioT0 != null && (a.cmd === "sync" || a.cmd === "start") && typeof a.t0 !== "number") {
                                a.t0 = state.audioT0;
                                state.audioT0 = null;
                            }

                            window.octopusAnimator.handleCommand(a);
                        }
                    }
                } catch (e) {
                    // Ignore parsing errors for non-JSON or binary data
                }
            });
            console.log("✅ WebSocket interceptor installed");
        }

        function startHeartbeat() {
            if (state.heartbeatTimer) return;
            if (!state.heartbeatEnabled) return;
            state.heartbeatTimer = setInterval(() => {
                if (!state.geminiClient || !state.geminiClient.webSocket) return;
                if (state.geminiClient.webSocket.readyState !== WebSocket.OPEN) return;
                const ap = state.audioPlayer;
                const playbackDelay = ap
                    ? Math.max(0, (typeof ap.queuedSeconds === "number" ? ap.queuedSeconds : (ap.queuedSamples || 0) / (ap.lastQueueSr || 24000)))
                    : 0;
                state.geminiClient.sendMessage({
                    client_event: {
                        type: "heartbeat",
                        playback_delay_s: playbackDelay
                    }
                });
            }, 1500); // Увеличено с 250ms до 1500ms (1.5 сек) для снижения нагрузки на WebSocket
        }

        // ============== AUDIO CONTROL ==============
        async function toggleAudio() {
            const btn = document.getElementById('audioBtn');

            if (!state.audioStreamer) {
                try {
                    state.audioStreamer = new AudioStreamer(state.geminiClient);
                    await state.audioStreamer.start();
                    state.micUserEnabled = true;
                    btn.classList.add('active');
                    btn.textContent = '🎤 Стоп';
                } catch (err) {
                    updateStatus("❌ Микрофон: " + err.message);

                }
            } else {
                state.audioStreamer.stop();
                state.audioStreamer = null;
                state.micUserEnabled = false;
                btn.classList.remove('active');
                btn.textContent = '🎤 Микрофон';

            }

        }

        // ============== VIDEO CONTROL ==============
        async function toggleVideo() {
            const btn = document.getElementById('videoBtn');
            const container = document.getElementById('videoContainer');

            if (!state.videoStreamer) {
                try {
                    state.videoStreamer = new SplitVideoStreamer(state.geminiClient);
                    state.videoStreamer.gazeOnFrame = (b64, mime, w, h) => {
                        sendGazeFrame(b64, mime, w, h);
                    };

                    // ============ Face ID Handler ============
                    state.videoStreamer.onFaceIDResult = (result) => {
                        const now = Date.now();
                        const USER_TIMEOUT_MS = 5000;   // убрать из кадра если не виден 5 сек
                        const CONFIRM_MS = 3000;         // новый человек должен быть в кадре 3 сек

                        if (result.type === "face_identified") {
                            const incomingUsers = result.users || [];

                            // Обновить время последнего появления для всех распознанных
                            for (const u of incomingUsers) {
                                const existing = state.activeUsers.get(u.user_id);
                                state.activeUsers.set(u.user_id, {
                                    name: u.user_name,
                                    lastSeenTs: now,
                                    history: u.user_history || {},
                                    confirmedTs: existing ? existing.confirmedTs : now
                                });
                            }

                            // Удалить тех кого давно не видно
                            for (const [uid, data] of state.activeUsers) {
                                if (now - data.lastSeenTs > USER_TIMEOUT_MS) {
                                    state.activeUsers.delete(uid);
                                }
                            }

                            // Текущий состав подтверждённых пользователей (в кадре ≥ CONFIRM_MS)
                            const confirmed = [...state.activeUsers.entries()]
                                .filter(([, d]) => now - d.confirmedTs >= CONFIRM_MS)
                                .map(([uid, d]) => ({ user_id: uid, ...d }));

                            const newKey = confirmed.map(u => u.user_id).sort().join(",");

                            if (newKey !== state.lastActiveKey && confirmed.length > 0 && state.geminiClient) {
                                state.lastActiveKey = newKey;

                                // Обновить state.currentUserId на первого подтверждённого
                                state.currentUserId = confirmed[0].user_id;
                                state.currentUserName = confirmed[0].name;

                                // Сформировать контекст для всех кто в кадре
                                const usersDesc = confirmed.map(u => {
                                    const h = u.history || {};
                                    const lastSeen = h.last_seen ? new Date(h.last_seen).toLocaleString('ru-RU') : "впервые";
                                    return `- ${u.name}: встреч ${h.interaction_count || 0}, эмоция ${h.average_emotion || "neutral"}, последний раз ${lastSeen}`;
                                }).join("\n");

                                const names = confirmed.map(u => u.name).join(" и ");
                                const contextMsg = `[CONTEXT] В кадре сейчас:\n${usersDesc}\nОбращайся к ним по имени: ${names}.`;
                                state.geminiClient.sendContextMessage(contextMsg);
                                console.log(`✅ Контекст обновлён: ${names}`);

                                updateStatus(`👋 ${names}`);
                                state.unknownUserGreetingSent = false;
                                updateEmotion('happy');
                                if (window.octopusAnimator) {
                                    window.octopusAnimator.handleCommand({ cmd: 'action', action: 'greet', duration: 1.5 });
                                }
                            }

                        } else if (result.type === "face_unknown") {
                            // Лицо не узнано - новый пользователь
                            console.log("🆕 Unknown face detected");
                            updateStatus("👤 Новое лицо! Начинаю разговор...");

                            // Обновить эмоцию на любопытство
                            updateEmotion('neutral');

                            // Аватар смотрит вверх (любопытство)
                            if (window.octopusAnimator) {
                                window.octopusAnimator.handleCommand({
                                    cmd: 'action',
                                    action: 'curious',
                                    duration: 2.0
                                });
                            }

                            // 🔥 ОТПРАВИТЬ СООБЩЕНИЕ В GEMINI - ТОЛЬКО ОДИН РАЗ
                            if (!state.unknownUserGreetingSent) {
                                if (state.geminiClient && state.geminiClient.connected) {
                                    state.unknownUserGreetingSent = true;
                                    const msg = result.message || "Привет! Мы не знакомы. Спроси, как меня зовут, и давай знакомиться!";
                                    console.log("📢 Sending greeting to unknown user:", msg);
                                    state.geminiClient.sendTextMessage(msg);
                                } else {
                                    console.warn(`⚠️ Cannot send greeting: Gemini client not connected (connected=${state.geminiClient?.connected})`);
                                }
                            } else {
                                // console.log("ℹ️ Greeting already sent for this session");
                            }

                        } else if (result.type === "no_face") {
                            // Лиц нет в кадре - ничего не делаем
                            // console.log("No face detected");
                        }
                    };

                    const video = await state.videoStreamer.start({
                        gemini: { fps: 1, width: 640, height: 480, quality: 0.8 },
                        gaze: { fps: 12, width: 320, height: 240, quality: 0.6 }, // ускорено ради отзывчивости
                    });
                    container.innerHTML = '';
                    container.appendChild(video);
                    btn.classList.add('active');
                    btn.textContent = '📹 Стоп';
                } catch (err) {
                    updateStatus("❌ Камера: " + err.message);

                }
            } else {
                state.videoStreamer.stop();
                state.videoStreamer.onFrame = null;
                state.videoStreamer = null;
                if (state.gazeSocket) {
                    state.gazeSocket.close();
                    state.gazeSocket = null;
                }
                // Сбросить флаги при выключении камеры
                state.unknownUserGreetingSent = false;
                state.activeUsers = new Map();
                state.lastActiveKey = "";
                container.innerHTML = '<p>📷 Камера выключена</p>';
                btn.classList.remove('active');
                btn.textContent = '📹 Камера';

            }

        }

        async function startPhotoboothSession(userName, initialMessage) {
            console.log(`🎬 Photobooth Session Started for ${userName}`);

            // 1. Показать сообщение от аватара в чате
            if (initialMessage) {
                addMessage(initialMessage, "assistant");
            }

            // 2. Визуальная индикатор в интерфейсе
            updateStatus(`📸 Фотосессия для ${userName}... Не двигайся!`);

            const photoboothOverlay = document.createElement('div');
            photoboothOverlay.style.position = 'fixed';
            photoboothOverlay.style.top = '0';
            photoboothOverlay.style.left = '0';
            photoboothOverlay.style.width = '100vw';
            photoboothOverlay.style.height = '100vh';
            photoboothOverlay.style.backgroundColor = 'rgba(255,255,255,0.8)';
            photoboothOverlay.style.display = 'flex';
            photoboothOverlay.style.flexDirection = 'column';
            photoboothOverlay.style.alignItems = 'center';
            photoboothOverlay.style.justifyContent = 'center';
            photoboothOverlay.style.zIndex = '9999';
            photoboothOverlay.style.transition = 'background-color 0.1s ease';
            photoboothOverlay.innerHTML = `
                <div style="background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center;">
                    <h1 style="color: #333; font-size: 32px; margin-bottom: 20px;">🐙 Привет, ${userName}!</h1>
                    <p style="font-size: 20px; color: #666; margin-bottom: 30px;">Запоминаю твоё лицо...</p>
                    <div id="countdown" style="font-size: 80px; font-weight: bold; color: #ff00ff; min-height: 100px;">3</div>
                </div>
            `;
            document.body.appendChild(photoboothOverlay);

            const countdownEl = document.getElementById('countdown');
            const frames = [];

            // Звуковой эффект вспышки
            const shutterSound = new Audio('https://www.soundjay.com/mechanical/camera-shutter-click-01.mp3');

            for (let i = 3; i > 0; i--) {
                countdownEl.textContent = i;
                await new Promise(r => setTimeout(r, 1000));
            }

            countdownEl.textContent = "📸";

            // Сделать 5 снимков с интервалом
            for (let i = 0; i < 5; i++) {
                if (state.videoStreamer) {
                    const snapshot = state.videoStreamer.takeSnapshot();
                    const base64 = snapshot.split(',')[1];
                    frames.push(base64);

                    // Эффект вспышки
                    photoboothOverlay.style.backgroundColor = 'white';
                    try { shutterSound.play(); } catch (e) { }
                    setTimeout(() => { photoboothOverlay.style.backgroundColor = 'rgba(255,255,255,0.8)'; }, 100);
                }
                await new Promise(r => setTimeout(r, 500));
            }

            countdownEl.style.fontSize = "32px";
            countdownEl.textContent = "Готово! Обрабатываю...";

            // Отправить на сервер для получения эмбеддинга и регистрации
            try {
                // Берем первый кадр для простоты
                const res = await fetch('/api/face/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_b64: frames[0] })
                });

                const data = await res.json();
                if (data.faces && data.faces.length > 0) {
                    const embedding = data.faces[0].embedding;

                    const regRes = await fetch('/api/face/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_name: userName,
                            embedding: embedding,
                            photobooth_frames_count: frames.length
                        })
                    });

                    const regData = await regRes.json();
                    addMessage(regData.message, "assistant");
                    updateStatus(`✅ ${userName} зарегистрирован!`);

                    // Визуальное подтверждение успеха
                    countdownEl.style.color = "#00ff00";
                    countdownEl.textContent = "✨ Запомнил! ✨";
                } else {
                    addMessage("Ой, я не смог разглядеть твоё лицо на фото. Давай попробуем позже!", "assistant");
                    countdownEl.style.color = "#ff0000";
                    countdownEl.textContent = "❌ Лицо не найдено";
                }
            } catch (err) {
                console.error("Registration error:", err);
                countdownEl.textContent = "❌ Ошибка сервера";
            }

            setTimeout(() => {
                if (photoboothOverlay.parentNode) {
                    document.body.removeChild(photoboothOverlay);
                }
            }, 2500);
        }

        // ============== TEST FUNCTION ==============
        window.testAnimation = (emotion = 'happy') => {
            animator.handleCommand({
                cmd: 'start',
                visemes: ['REST', 'A', 'E', 'I', 'O', 'U', 'E', 'A', 'REST'],
                emotion: emotion,
                duration: 2.5
            });
            updateEmotion(emotion);
        };

        function runEmotionTest() {
            const emotion = document.getElementById('test-emotion').value;
            updateEmotion(emotion);
            if (window.octopusAnimator && typeof window.octopusAnimator.handleCommand === "function") {
                window.octopusAnimator.handleCommand({
                    cmd: "emotion",
                    emotion: emotion
                });
            }
        }

        function runActionTest() {
            const action = document.getElementById('test-action').value;
            updateAction(action);
            playSfx(action);
            if (action === "photobooth") {
                playActionSfx(action);
            }
            if (window.octopusAnimator && typeof window.octopusAnimator.handleCommand === "function") {
                if (action !== "none") {
                    window.octopusAnimator.handleCommand({
                        cmd: "action",
                        action: action,
                        duration_ms: 1400
                    });
                }
            }
        }

        window.addEventListener("octopus-audio-chunk", (e) => {
            if (state.audioT0 == null) state.audioT0 = e.detail?.t0 ?? null;
        });

        // ============== INIT ==============
        window.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('chatInput').disabled = true;
            document.getElementById('sendBtn').disabled = true;

            // 🔥 Инициализировать audioPlayer ДО подключения к Gemini
            // Это нужно чтобы липсинк работал даже если микрофон включен первым
            try {
                state.audioPlayer = new AudioPlayer();
                await state.audioPlayer.init();
                window.getAudioPlayheadS = () => state.audioPlayer.getPlayheadS();
                window.__audioPlayer = state.audioPlayer;
                console.log("✅ AudioPlayer инициализирован при загрузке");
            } catch (err) {
                console.error("❌ Ошибка инициализации AudioPlayer:", err);
            }

            // 🔥 Включить отладку липсинка (можно вводить в браузерной консоли: window.__lipDebug = true)
            window.__lipDebug = false;
            console.log("💡 Для отладки липсинка введите в консоли: window.__lipDebug = true");

            // 🔥 Инициализировать gaze socket для audio_sync команд из timeline-sync
            ensureGazeSocket();
            console.log("✅ Gaze socket initialized for audio_sync commands");

            // Start connection
            setTimeout(connectGemini, 300);
        });
    </script>
