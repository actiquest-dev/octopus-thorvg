<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Octobuss Reference Lock</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      display: grid;
      place-items: center;
      background: #cfd2d7;
    }
    .frame {
      width: min(88vmin, 820px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: auto;
      user-select: none;
      -webkit-user-drag: none;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="octobuss.svg" alt="Octobuss exact reference" />
  </div>
</body>
</html>
