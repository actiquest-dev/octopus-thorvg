  <div class="hud">Pixel-rig mode: source texture + per-tentacle clips</div>

  <script>
    const layers = [...document.querySelectorAll('.tentacle')];
    const t0 = performance.now();

    const cfg = {
      tentacle_01: {amp: 10, sway: 0.080, lift: 2.0, phase: 0.0},
      tentacle_02: {amp: 11, sway: 0.085, lift: 2.3, phase: 0.9},
      tentacle_03: {amp: 12, sway: 0.090, lift: 2.7, phase: 1.7},
      tentacle_04: {amp: 13, sway: 0.097, lift: 3.0, phase: 2.4},
      tentacle_05: {amp: 13, sway: 0.097, lift: 3.0, phase: 3.2},
      tentacle_06: {amp: 12, sway: 0.090, lift: 2.7, phase: 3.9},
      tentacle_07: {amp: 11, sway: 0.085, lift: 2.3, phase: 4.6},
      tentacle_08: {amp: 10, sway: 0.080, lift: 2.0, phase: 5.3},
    };

    function tick(now) {
      const t = (now - t0) / 1000;
      for (const layer of layers) {
        const id = layer.dataset.base;
        const c = cfg[id] || cfg.tentacle_01;

        const a = Math.sin(t * 1.45 + c.phase);
        const b = Math.sin(t * 2.10 + c.phase * 1.37);

        const rot = a * c.amp;
        const tx = b * c.sway * 18;
        const ty = -Math.abs(a) * c.lift;
        const sx = 1 + (Math.abs(b) * 0.012);
        const sy = 1 - (Math.abs(a) * 0.018);

        layer.style.transform = `translate(${tx.toFixed(2)}px, ${ty.toFixed(2)}px) rotate(${rot.toFixed(2)}deg) scale(${sx.toFixed(3)}, ${sy.toFixed(3)})`;
      }
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>
</body>
</html>
