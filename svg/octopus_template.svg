<?xml version="1.0" encoding="UTF-8"?>
<svg width="240" height="240" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      .octopus-head { fill: #FF6B9D; stroke: #FF1493; stroke-width: 2; }
      .octopus-eye { fill: white; stroke: black; stroke-width: 1; }
      .octopus-pupil { fill: black; }
      .octopus-mouth { stroke: black; stroke-width: 2; fill: none; }
      .octopus-eyebrow { stroke: #333; stroke-width: 2; fill: none; stroke-linecap: round; }
      .octopus-arm { stroke: #FF6B9D; stroke-width: 3; fill: none; stroke-linecap: round; }
    </style>
  </defs>
  
  <g id="octopus">
    <!-- HEAD -->
    <circle id="head" cx="120" cy="80" r="50" class="octopus-head"/>
    
    <!-- EYES - grouped for transform origin -->
    <g id="left-eye-group" transform-origin="100 70">
      <circle id="left-eye-white" cx="100" cy="70" r="8" class="octopus-eye"/>
      <circle id="left-eye-pupil" cx="100" cy="70" r="4" class="octopus-pupil"/>
    </g>
    <g id="right-eye-group" transform-origin="140 70">
      <circle id="right-eye-white" cx="140" cy="70" r="8" class="octopus-eye"/>
      <circle id="right-eye-pupil" cx="140" cy="70" r="4" class="octopus-pupil"/>
    </g>
    
    <!-- EYEBROWS -->
    <path id="left-eyebrow" d="M 90 55 Q 100 50 110 55" class="octopus-eyebrow"/>
    <path id="right-eyebrow" d="M 130 55 Q 140 50 150 55" class="octopus-eyebrow"/>
    
    <!-- MOUTH -->
    <path id="mouth" d="M 100 110 Q 120 125 140 110" class="octopus-mouth">
      <!--MOUTH_ANIMATE_PLACEHOLDER-->
    </path>
    
    <!-- ARMS - each with individual ID for targeted animation -->
    <g id="arms-group">
      <path id="arm-0" d="M 170 120 Q 195 115 220 130" class="octopus-arm"/>
      <path id="arm-1" d="M 155 150 Q 175 170 190 195" class="octopus-arm"/>
      <path id="arm-2" d="M 120 165 Q 120 190 120 220" class="octopus-arm"/>
      <path id="arm-3" d="M 85 150 Q 65 170 50 195" class="octopus-arm"/>
      <path id="arm-4" d="M 70 120 Q 45 115 20 130" class="octopus-arm"/>
      <path id="arm-5" d="M 85 90 Q 60 70 40 50" class="octopus-arm"/>
      <path id="arm-6" d="M 120 55 Q 120 30 120 5" class="octopus-arm"/>
      <path id="arm-7" d="M 155 90 Q 180 70 200 50" class="octopus-arm"/>
    </g>
    
    <!--ARMS_ANIMATE_PLACEHOLDER-->
    <!--EYEBROW_ANIMATE_PLACEHOLDER-->
    <!--BLINK_ANIMATE_PLACEHOLDER-->
  </g>
</svg>
