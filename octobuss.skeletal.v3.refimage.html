<!doctype html>
<html lang="ru">
<head>

    html, body { margin: 0; height: 100%; }
    body {
      display: grid;
      place-items: center;
      background: #c8ccd4;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }
    .stage { width: min(86vmin, 760px); aspect-ratio: 472 / 540; }

    .tentacle-fill {

      stroke: #7445a8;
      stroke-width: 4;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .tentacle-shade { fill: rgba(117, 71, 172, 0.26); }
    .tentacle-hi {
      fill: none;
      stroke: rgba(216, 186, 244, 0.78);
      stroke-width: 4;
      stroke-linecap: round;
    }
    .sucker {
      fill: #f2a3c1;
      stroke: #c8749b;
      stroke-width: 1.4;
    }
    .body-fill { fill: #a67fd8; stroke: #7445a8; stroke-width: 4; }
    .helmet {
      fill: rgba(180, 225, 242, 0.22);
      stroke: #79a7bf;
      stroke-width: 3.2;
    }
  </style>
</head>

  <script>
    const anim = [
      { id: 'tentacle_01', amp: 6.5, speed: 1.2, phase: 0.0 },
      { id: 'tentacle_02', amp: 8.0, speed: 1.35, phase: 0.7 },
      { id: 'tentacle_03', amp: 9.5, speed: 1.5, phase: 1.3 },
      { id: 'tentacle_04', amp: 6.0, speed: 1.1, phase: 2.2 },
      { id: 'tentacle_05', amp: 6.0, speed: 1.1, phase: 2.8 },
      { id: 'tentacle_06', amp: 9.5, speed: 1.5, phase: 3.7 },
      { id: 'tentacle_07', amp: 8.0, speed: 1.35, phase: 4.3 },
      { id: 'tentacle_08', amp: 6.5, speed: 1.2, phase: 5.0 }
    ].map(cfg => {
      const node = document.getElementById(cfg.id);
      return {
        ...cfg,
        node,
        px: Number(node.dataset.pivotX),
        py: Number(node.dataset.pivotY),
      };
    });

    const eyes = document.getElementById('eyes');
    const mouthTop = document.querySelector('#body path[d^="M206"]');
    const mouthTongue = document.querySelector('#body path[d^="M216"]');
    const body = document.getElementById('body');
    const collar = document.getElementById('collar');

    function frame(ms) {
      const t = ms * 0.001;
      const breathe = Math.sin(t * 1.9) * 1.8;

      for (const a of anim) {
        const rot = Math.sin(t * a.speed + a.phase) * a.amp;
        const ty = -Math.abs(Math.sin(t * a.speed + a.phase)) * 0.9;
        a.node.setAttribute('transform', `translate(0 ${ty.toFixed(2)}) rotate(${rot.toFixed(2)} ${a.px} ${a.py})`);
      }

      body.setAttribute('transform', `translate(0 ${(breathe * 0.8).toFixed(2)})`);
      collar.setAttribute('transform', `translate(0 ${(breathe * 0.6).toFixed(2)})`);

      const lookX = Math.sin(t * 0.52) * 2.8;
      const lookY = Math.sin(t * 0.41 + 0.6) * 1.8;
      eyes.setAttribute('transform', `translate(${lookX.toFixed(2)} ${lookY.toFixed(2)})`);

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
