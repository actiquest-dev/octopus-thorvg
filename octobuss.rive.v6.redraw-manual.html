<script>
const rigs = [
 ['tentacle_01',5.4,1.08,0.0],['tentacle_02',6.7,1.22,0.6],['tentacle_03',8.2,1.43,1.2],['tentacle_04',5.8,1.05,2.1],
 ['tentacle_05',5.8,1.05,2.8],['tentacle_06',8.2,1.43,3.5],['tentacle_07',6.7,1.22,4.2],['tentacle_08',5.4,1.08,4.8]
].map(([id,amp,speed,phase])=>({id,amp,speed,phase,node:document.getElementById(id)}));

const pupils=[document.getElementById('pupil_l'),document.getElementById('pupil_r')];
const body=document.getElementById('body');
const collar=document.getElementById('collar');

function tick(ms){
  const t=ms*0.001;
  const breathe=Math.sin(t*1.9)*1.2;
  for(const r of rigs){
    const a=Math.sin(t*r.speed+r.phase);
    const rot=a*r.amp;
    const ty=-Math.abs(a)*1.1;
    r.node.setAttribute('transform',`translate(0 ${ty.toFixed(2)}) rotate(${rot.toFixed(2)} ${r.node.getAttribute('data-pivot-x')} ${r.node.getAttribute('data-pivot-y')})`);
  }
  body.setAttribute('transform',`translate(0 ${(breathe*0.8).toFixed(2)})`);
  collar.setAttribute('transform',`translate(0 ${(breathe*0.55).toFixed(2)})`);
  const lx=Math.sin(t*0.5)*2.6, ly=Math.sin(t*0.36+0.8)*1.7;
  pupils[0].setAttribute('cx',(335+lx).toFixed(2)); pupils[0].setAttribute('cy',(286+ly).toFixed(2));
  pupils[1].setAttribute('cx',(468+lx).toFixed(2)); pupils[1].setAttribute('cy',(286+ly).toFixed(2));
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);
</script>
