<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Octopus Rig Animation (Locked Layers)</title>
  <style>
    html, body { margin:0; height:100%; background:#0c1020; display:grid; place-items:center; }
    #stage { width:min(92vw,900px); height:min(92vh,900px); }
    #stage svg { width:100%; height:100%; display:block; }
  </style>
</head>
<body>
  <div id="stage"></div>
  <script>
    (async function () {
      const stage = document.getElementById('stage');
      const txt = await (await fetch('./octobuss.rig.svg', { cache: 'no-store' })).text();
      const svg = new DOMParser().parseFromString(txt, 'image/svg+xml').documentElement;
      stage.appendChild(svg);

      // Fixed joint pivots (user-space coordinates) -> no layer drift.
      const pivots = {
        tentacle_01: [350, 590], tentacle_02: [410, 610], tentacle_03: [465, 620], tentacle_04: [520, 625],
        tentacle_05: [570, 625], tentacle_06: [620, 620], tentacle_07: [675, 610], tentacle_08: [735, 590]
      };

      const tentacles = [...svg.querySelectorAll('g[id^="tentacle_"]')];
      tentacles.forEach((g, i) => {
        const id = g.id;
        const [px, py] = pivots[id] || [512, 620];
        g.style.transformBox = 'view-box';
        g.style.transformOrigin = `${px}px ${py}px`;
        g.style.willChange = 'transform';
      });

      let t = 0;
      function frame() {
        t += 0.055;
        tentacles.forEach((g, i) => {
          const side = i < 4 ? -1 : 1;
          const angle = Math.sin(t * 1.2 + i * 0.55) * (4.6 + (i % 3) * 0.8) * side;
          const swayX = Math.sin(t + i * 0.3) * 1.2 * side;
          // Single transform on group only.
          g.style.transform = `translateX(${swayX.toFixed(2)}px) rotate(${angle.toFixed(2)}deg)`;
        });
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
